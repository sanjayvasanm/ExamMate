<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Exam Mate - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = {darkMode:"class",theme:{extend:{borderRadius:{DEFAULT:"0.25rem",lg:"0.5rem",xl:"0.75rem",full:"9999px"},fontFamily:{headline:["Public Sans"],body:["Public Sans"],label:["Public Sans"]}}}}
</script>
<style>
  * { box-sizing: border-box; }
  body { font-family:'Public Sans',sans-serif; min-height:100dvh; background:#0D0C22; color:#e2e8f0; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
  .glass-panel { background:rgba(255,255,255,0.03); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.1); }
  .spinner { width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block; }
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none; }
  .toast.show { opacity:1; }
  .toast.error { background:#dc2626;color:#fff; }
  .toast.success { background:#008A3F;color:#fff; }
</style>
</head>
<body class="bg-[#0D0C22] font-body text-slate-200 min-h-screen flex items-center justify-center overflow-hidden">

<!-- Background -->
<div class="fixed inset-0 z-0">
  <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#008A3F]/10 rounded-full blur-[120px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-900/20 rounded-full blur-[100px]"></div>
</div>

<main class="relative z-10 w-full max-w-[440px] px-6">
  <!-- Brand -->
  <div class="flex flex-col items-center mb-10">
    <div class="w-16 h-16 bg-[#008A3F] rounded-2xl flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(0,138,63,0.4)]">
      <span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings:'FILL' 1;">auto_awesome</span>
    </div>
    <h1 class="text-3xl font-black text-white tracking-tight font-headline">Exam Mate</h1>
    <p class="text-slate-400 mt-2 font-medium">Your intelligent study companion</p>
  </div>

  <!-- Card -->
  <div class="glass-panel rounded-[2rem] p-8 shadow-2xl">
    <div class="mb-8">
      <h2 class="text-xl font-bold text-white mb-2">Welcome Back</h2>
      <p class="text-slate-400 text-sm">Please enter your details to sign in</p>
    </div>

    <form id="loginForm" class="space-y-6" onsubmit="handleLogin(event)">
      <!-- Email -->
      <div class="space-y-2">
        <label class="text-[11px] font-bold uppercase tracking-[0.1em] text-[#008A3F] ml-1" for="email">Email Address</label>
        <div class="relative group">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-[#008A3F] transition-colors">mail</span>
          <input class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-[#008A3F]/50 focus:border-[#008A3F] transition-all" id="email" name="email" placeholder="name@company.com" type="email" required/>
        </div>
      </div>
      <!-- Password -->
      <div class="space-y-2">
        <div class="flex justify-between items-center ml-1">
          <label class="text-[11px] font-bold uppercase tracking-[0.1em] text-[#008A3F]" for="password">Password</label>
        </div>
        <div class="relative group">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-[#008A3F] transition-colors">lock</span>
          <input class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-3.5 pl-12 pr-12 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-[#008A3F]/50 focus:border-[#008A3F] transition-all" id="password" name="password" placeholder="••••••••" type="password" required/>
          <button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white" type="button" onclick="togglePwd('password','eyeIcon')">
            <span class="material-symbols-outlined text-xl" id="eyeIcon">visibility</span>
          </button>
        </div>
      </div>
      <!-- Submit -->
      <button id="loginBtn" class="w-full bg-[#008A3F] hover:bg-[#007335] text-white font-bold py-4 rounded-xl shadow-[0_4px_20px_rgba(0,138,63,0.3)] transition-all transform active:scale-[0.98] flex items-center justify-center space-x-2" type="submit">
        <span id="loginBtnText">Sign In</span>
        <span class="material-symbols-outlined text-xl">arrow_forward</span>
      </button>
    </form>

    <div class="mt-8 pt-8 border-t border-slate-800/50 text-center">
      <p class="text-slate-500 text-sm">Don't have an account?</p>
      <button onclick="navigate('signup')" class="mt-4 w-full bg-transparent border border-slate-700 hover:border-slate-500 text-white font-semibold py-3 rounded-xl transition-all">
        Create free account
      </button>
    </div>
  </div>

  <footer class="mt-10 flex justify-center space-x-6 text-slate-500 text-[11px] font-bold uppercase tracking-widest">
    <a class="hover:text-[#008A3F] transition-colors" href="#">Privacy</a>
    <span class="w-1 h-1 bg-slate-700 rounded-full my-auto"></span>
    <a class="hover:text-[#008A3F] transition-colors" href="#">Terms</a>
    <span class="w-1 h-1 bg-slate-700 rounded-full my-auto"></span>
    <a class="hover:text-[#008A3F] transition-colors" href="#">Support</a>
  </footer>
</main>

<!-- Accent elements -->
<div class="fixed top-12 right-12 hidden lg:block opacity-20 pointer-events-none">
  <div class="flex items-center space-x-2 text-[#008A3F]">
    <span class="h-[1px] w-12 bg-[#008A3F]"></span>
    <span class="text-[10px] tracking-[0.4em] uppercase font-bold">Protocol v2.4.0</span>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="../api-utils.js"></script>
<script>


function togglePwd(fieldId, iconId) {
  const f = document.getElementById(fieldId);
  const i = document.getElementById(iconId);
  if (f.type === 'password') { f.type='text'; i.textContent='visibility_off'; }
  else { f.type='password'; i.textContent='visibility'; }
}

// If already logged in go to dashboard
if (localStorage.getItem('em_token')) {
  navigate('dashboard');
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const btnText = document.getElementById('loginBtnText');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span>';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');

    localStorage.setItem('em_token', data.token);
    localStorage.setItem('em_user', JSON.stringify(data.user));
    showToast('Welcome back, ' + data.user.name + '!', 'success');
    setTimeout(() => navigate('dashboard'), 500);
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btnText.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
