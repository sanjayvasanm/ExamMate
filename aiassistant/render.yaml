services:
  - type: web
    name: exam-mate-backend
    # Switch to Docker runtime for maximum reliability with monorepo paths
    runtime: docker
    # Specify the local context and the path to the Dockerfile
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: JWT_SECRET
        sync: false # Set this in Render Dashboard
      - key: GROQ_API_KEY
        sync: false # Set this in Render Dashboard
      - key: MONGO_URI
        sync: false # Set your MongoDB Atlas connection string here
      - key: CORS_ORIGINS
        value: "*" # Update this to your frontend URL in production for better security
